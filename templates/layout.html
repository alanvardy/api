<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Admin{% endblock %}</title>
<style>
:root {
  --bg: #f4f6fb;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --muted: #64748b;
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --green: #16a34a;
  --green-bg: #dcfce7;
}
* { box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  margin: 0;
  padding: 2.5rem 1.5rem;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
.container { max-width: 960px; margin: 0 auto; }
h1 { margin: 0 0 1.5rem; font-size: 1.75rem; font-weight: 700; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
table { border-collapse: collapse; width: 100%; }
th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
th {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  font-weight: 600;
}
tbody tr { transition: background 0.15s ease; }
tbody tr:hover { background: #f8fafc; }
tbody tr:last-child td { border-bottom: none; }
form { margin: 0; }
.inline-form { display: flex; gap: 0.5rem; align-items: center; }
.create-form { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
label { display: flex; gap: 0.4rem; align-items: center; color: var(--muted); }
input[type="text"] {
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.95rem;
  min-width: 220px;
}
input[type="text"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); }
button {
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s ease;
}
button:hover { background: var(--primary-hover); }
.status { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.85rem; font-weight: 600; }
.status-enabled { background: var(--green-bg); color: var(--green); }
.status-disabled { background: #f1f5f9; color: var(--muted); }
nav { margin-bottom: 1.5rem; }
nav a { color: var(--primary); text-decoration: none; margin-right: 1rem; font-weight: 600; }
nav a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
<nav>
  <a href="/feature_flags/web">Feature Flags</a>
</nav>
<h1>{% block heading %}{% endblock %}</h1>
{% block content %}{% endblock %}
</div>
</body>
</html>
